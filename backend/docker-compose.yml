services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: endemigo
      POSTGRES_USER: endemigo
      POSTGRES_PASSWORD: endemigo_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis_dev

volumes:
  postgres_data:
