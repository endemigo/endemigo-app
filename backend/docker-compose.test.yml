services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: endemigo_test
      POSTGRES_USER: endemigo
      POSTGRES_PASSWORD: endemigo_test
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U endemigo -d endemigo_test"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis-test:
    image: redis:7-alpine
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20
